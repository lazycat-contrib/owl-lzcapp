# Owl 部署参数配置
params:
  # 数据库配置
  - id: db_type
    type: string
    name: "Database Type"
    description: "Database backend type. SQLite is default (no DSN needed). Options: sqlite, postgres, mysql. For postgres: OWL_DB_DSN=postgres://user:pass@host:5432/dbname?sslmode=disable. For mysql: OWL_DB_DSN=user:pass@tcp(host:3306)/dbname?parseTime=true&charset=utf8mb4&loc=Local"
    default_value: "sqlite"

  - id: db_dsn
    type: secret
    name: "Database DSN"
    description: "Database connection string (only needed for postgres/mysql). SQLite uses OWL_DB_PATH=/app/data/data.db by default. PostgreSQL format: postgres://owl:password@postgres:5432/owl?sslmode=disable. MySQL format: owl:password@tcp(mysql:3306)/owl?parseTime=true&charset=utf8mb4&loc=Local"
    default_value: "file:/app/data/data.db?cache=shared&_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)&_pragma=busy_timeout(10000)"

  # 管理员账号配置
  - id: bootstrap_admin
    type: bool
    name: "Bootstrap Admin"
    description: "Create default admin account on first startup"
    default_value: true

  - id: admin_username
    type: string
    name: "Admin Username"
    description: "Default administrator username"
    default_value: "admin"
    optional: true

  - id: admin_password
    type: secret
    name: "Admin Password"
    description: "Default administrator password"
    default_value: "$random(len=20)"
    optional: true

  # 数据目录配置
  - id: library_dir
    type: string
    name: "Library Directory"
    description: "if you already have previously downloaded dictionary files, please modify this path. Default is the same directory as the uploaded dictionary files through Web.you can download dictionary files from https://mdict.org"
    default_value: "/app/data/uploads"
    optional: true

  # Redis 配置
  - id: redis_db
    type: string
    name: "Redis Database"
    description: "Redis database number (0-15)"
    default_value: "0"
    optional: true

  - id: redis_key_prefix
    type: string
    name: "Redis Key Prefix"
    description: "Prefix for Redis keys"
    default_value: "owl:mdx:index"
    optional: true

  - id: redis_prefix_max_len
    type: string
    name: "Redis Prefix Max Length"
    description: "Maximum length for Redis prefix"
    default_value: "8"
    optional: true

  - id: redis_search_key_prefix
    type: string
    name: "Redis Search Key Prefix"
    description: "Prefix for Redis search keys"
    default_value: "owl:mdx:search"
    optional: true

locales:
  zh:
    db_type:
      name: "数据库类型"
      description: "数据库后端类型。默认 SQLite（无需设置连接串）。可选: sqlite, postgres, mysql。PostgreSQL 格式: postgres://用户:密码@主机:5432/库名?sslmode=disable。MySQL 格式: 用户:密码@tcp(主机:3306)/库名?parseTime=true&charset=utf8mb4&loc=Local"
